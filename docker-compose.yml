services:
  mysql:
    image: mysql:8.0
    container_name: leets_mysql
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      TZ: Asia/Seoul
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - leets_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 3s
      timeout: 10s
      retries: 10
      start_period: 20s

  api:
    image: sispo3314/leets:v3
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}

      SECURITY_JWT_SECRET: ${JWT_SECRET}
      KAKAO_OAUTH_CLIENT_ID: ${KAKAO_CLIENT_ID}
      KAKAO_OAUTH_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET}
      KAKAO_OAUTH_REDIRECT_URI: ${KAKAO_REDIRECT_URI}

      TZ: Asia/Seoul

volumes:
  leets_mysql_data:
